<!DOCTYPE html>
<!--
  Utility page: open in browser, click buttons to download PNG icons.
  Run once during development to generate icon-192.png and icon-512.png.
  Place the downloaded PNGs into client/public/icons/
-->
<html>
<head>
  <title>VERDICT Icon Generator</title>
  <style>body{background:#0a0a0f;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;font-family:system-ui}</style>
</head>
<body>
  <h2>VERDICT Icon Generator</h2>
  <canvas id="c192" width="192" height="192"></canvas>
  <canvas id="c512" width="512" height="512"></canvas>
  <button id="dl192" style="padding:10px 24px;background:#7b2d8b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">Download icon-192.png</button>
  <button id="dl512" style="padding:10px 24px;background:#7b2d8b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">Download icon-512.png</button>
  <script>
    function drawIcon(canvas) {
      const s = canvas.width
      const ctx = canvas.getContext('2d')
      const r = s * 0.188 // corner radius

      // Background rounded rect
      ctx.beginPath()
      ctx.moveTo(r, 0); ctx.lineTo(s-r, 0); ctx.quadraticCurveTo(s,0,s,r)
      ctx.lineTo(s,s-r); ctx.quadraticCurveTo(s,s,s-r,s)
      ctx.lineTo(r,s); ctx.quadraticCurveTo(0,s,0,s-r)
      ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0)
      ctx.closePath()
      ctx.fillStyle = '#0a0a0f'
      ctx.fill()

      // Glow ring
      ctx.beginPath()
      ctx.arc(s/2, s/2, s*0.39, 0, Math.PI*2)
      ctx.strokeStyle = 'rgba(123,45,139,0.4)'
      ctx.lineWidth = s * 0.012
      ctx.stroke()

      const sc = s / 512  // scale factor

      // Scale beam
      ctx.fillStyle = '#7b2d8b'
      ctx.beginPath(); ctx.roundRect(236*sc, 148*sc, 40*sc, 10*sc, 5*sc); ctx.fill()
      // Pillar
      ctx.beginPath(); ctx.roundRect(251*sc, 155*sc, 10*sc, 130*sc, 5*sc); ctx.fill()
      // Base
      ctx.beginPath(); ctx.roundRect(196*sc, 285*sc, 120*sc, 10*sc, 5*sc); ctx.fill()

      // Arms
      ctx.strokeStyle = '#9b59b6'; ctx.lineWidth = 3*sc; ctx.lineCap = 'round'
      ctx.beginPath(); ctx.moveTo(240*sc,152*sc); ctx.lineTo(178*sc,158*sc); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(272*sc,152*sc); ctx.lineTo(334*sc,145*sc); ctx.stroke()

      // Chains
      ctx.strokeStyle = 'rgba(123,45,139,0.8)'
      ctx.beginPath(); ctx.moveTo(178*sc,155*sc); ctx.lineTo(178*sc,210*sc); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(334*sc,155*sc); ctx.lineTo(334*sc,195*sc); ctx.stroke()

      // Left pan
      ctx.strokeStyle = '#c77dff'; ctx.lineWidth = 3*sc
      ctx.beginPath(); ctx.ellipse(178*sc,222*sc,46*sc,12*sc,0,0,Math.PI*2); ctx.stroke()

      // Right pan
      ctx.strokeStyle = '#e63946'
      ctx.beginPath(); ctx.ellipse(334*sc,207*sc,46*sc,12*sc,0,0,Math.PI*2); ctx.stroke()

      // VERDICT text
      ctx.fillStyle = '#ffffff'
      ctx.font = `900 ${52*sc}px system-ui`
      ctx.textAlign = 'center'; ctx.letterSpacing = `${8*sc}px`
      ctx.fillText('VERDICT', s/2, 350*sc)

      // Subtitle
      ctx.fillStyle = 'rgba(123,45,139,0.8)'
      ctx.font = `${18*sc}px system-ui`
      ctx.letterSpacing = `${6*sc}px`
      ctx.fillText('SOCIAL DEDUCTION', s/2, 385*sc)
    }

    const c192 = document.getElementById('c192')
    const c512 = document.getElementById('c512')
    drawIcon(c192); drawIcon(c512)

    document.getElementById('dl192').onclick = () => {
      const a = document.createElement('a'); a.href = c192.toDataURL('image/png')
      a.download = 'icon-192.png'; a.click()
    }
    document.getElementById('dl512').onclick = () => {
      const a = document.createElement('a'); a.href = c512.toDataURL('image/png')
      a.download = 'icon-512.png'; a.click()
    }
  </script>
</body>
</html>
