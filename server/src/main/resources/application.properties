spring.application.name=verdict-server
server.port=8080

# ── PostgreSQL ────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/verdict}
spring.datasource.username=${DB_USER:verdict}
spring.datasource.password=${DB_PASS:verdict}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Redis ─────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# ── Gemini AI ─────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.verdict=DEBUG
logging.level.org.springframework.web.socket=INFO
