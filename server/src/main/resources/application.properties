spring.application.name=verdict-server
server.port=8080

# ── PostgreSQL (override in env for prod) ──────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/verdict}
spring.datasource.username=${DB_USER:verdict}
spring.datasource.password=${DB_PASS:verdict}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Redis (Upstash — override in env for prod) ────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.verdict=DEBUG
logging.level.org.springframework.web.socket=INFO

# ── CORS is handled in CorsConfig.java ───────────────────────────────────
